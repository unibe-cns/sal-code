name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: scripts/datasets
          key: ${{ runner.os }}-datasets-mnist

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install local packages
        run: |
          pip install -e spiking_microcircuits/
          pip install -e spiking_sampling_network/
          pip install -e stdd_calculator/
          pip install -e symmnet/

      - name: Run tests
        run: |
          pytest tests/ -v
